name: live_cv_serverpod_flutter
description: A new Flutter project with Serverpod.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter
  serverpod_flutter: ^1.1.1
  live_cv_serverpod_client:
    path: ../live_cv_serverpod_client

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.5
  cloud_firestore: ^4.7.0
  firebase_core: ^2.12.0
  get_it: ^7.6.0
  dotted_border: ^2.0.0+3
  responsive_builder: ^0.7.0  
  freezed: ^2.3.5
  freezed_annotation: ^2.2.0
  json_annotation: ^4.8.1
  provider: ^6.0.5  
  fluro: ^2.0.5
  google_fonts: any
  scrollable_positioned_list: ^0.3.5
  carousel_slider: ^4.2.1
  flutter_svg: ^2.0.7
  url_launcher: ^6.1.12

##FLAVORS   
dev:
  main: lib/config/flavors/main_dev.dart
production:
  main: lib/config/flavors/main_prod.dart

dev_dependencies:
  flutter_lints: ^2.0.1
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.5
  json_serializable: ^6.7.0
# The following section is specific to Flutter.
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/portfolio/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
